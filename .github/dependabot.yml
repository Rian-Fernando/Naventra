version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
    labels:
      - dependencies
    ignore:
      # These majors are deliberate migrations, not automated bumps:
      #  - React 19 needs react + react-dom upgraded together, plus testing.
      #  - lucide-react 1.x renamed icon exports (e.g. Github), breaking the build.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "lucide-react"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: "/worker"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
